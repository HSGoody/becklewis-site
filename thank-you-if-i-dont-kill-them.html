  <style>
    * { box-sizing: border-box; }

    :root {
      --ink: #160018;
      --hot: #E01B72;
      --rose: #FF6AA2;
      --yellow: #FFE600;
      --cream: #FFF5FF;
      --soft: #F8C6D8;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--cream);
      background:
        radial-gradient(900px 620px at 50% -10%, rgba(224, 27, 114, 0.75), transparent 58%),
        radial-gradient(1100px 700px at 50% -10%, #980483, #230024 72%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 34px 20px;
      text-align: center;
    }

    .container {
      width: 100%;
      max-width: 680px;
    }

    .box {
      border: 1px solid rgba(255, 230, 0, 0.62);
      padding: 28px;
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.32);
      box-shadow: 0 20px 55px rgba(0,0,0,0.28);
    }

    h1 {
      font-size: clamp(2.1rem, 7vw, 4.2rem);
      line-height: 0.95;
      margin: 0 0 16px;
      text-transform: uppercase;
      letter-spacing: -0.035em;
    }

    p {
      font-size: 1.08rem;
      line-height: 1.55;
      margin: 0 0 14px;
    }

    .line {
      color: var(--soft);
      font-weight: bold;
      font-size: 1.2rem;
    }

    .cta-button {
      display: inline-block;
      margin-top: 16px;
      padding: 16px 24px;
      background: var(--yellow);
      color: var(--ink);
      text-decoration: none;
      border-radius: 9px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      transition: 0.2s;
    }

    .cta-button:hover,
    .cta-button:focus {
      background: #FFF06B;
      color: var(--ink);
      transform: translateY(-1px);
    }

    .small {
      margin-top: 16px;
      color: #F4CDE0;
      font-size: 0.92rem;
    }
  </style>

  <script>
    const amazonUrl = 'https://readerlinks.com/l/5504362';

    function continueToAmazon() {

    window.addEventListener('load', function () {
      setTimeout(continueToAmazon, 900);
    });
