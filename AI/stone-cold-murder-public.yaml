logline: When a woman is found buried in Hagley Woods with her hands missing, a detective raised in a
  philosophical cult and a disgraced former policeman must identify her before another vulnerable woman
  disappears into the same hidden system.
premise: A mutilated and unidentified woman is discovered in a shallow grave near Worcester. DC Ash Rigney,
  whose unusual childhood taught her to doubt the reality everyone else takes for granted, joins an understaffed
  West Mercia team alongside civilian investigator Caleb Barrett, a former detective trying to rebuild
  a life after professional disgrace. Their methodical inquiry moves through forensic evidence, digital
  traces, abandoned spaces and failures in refugee support, uncovering links between apparently separate
  crimes.
main_characters:
- name: DC Ash Rigney
  role: lead investigator
  description: A detective raised in the Perspectivist Fellowship, whose metaphysical outlook makes her
    both an outsider and a highly distinctive investigator.
- name: Caleb Barrett
  role: civilian investigator
  description: A disgraced former detective sergeant working under strict limitations while trying to
    recover professional purpose and personal stability.
- name: DI Maggie Shaw
  role: team leader
  description: A weary but committed detective inspector managing an affectionate, understaffed team inside
    a deteriorating institution.
- name: DC Hari Singh
  role: investigator
  description: A positive and grounded detective who acts as the investigative team's social glue.
- name: Dr Olivia Vronsky
  role: pathologist
  description: A forensic pathologist whose clinical findings are central to identifying the victims and
    understanding what happened to them.
unique_selling_points:
- A female detective raised inside a fictional metaphysical cult brings an existential lens to ordinary
  police work.
- A forensic mystery whose apparently occult imagery is repeatedly explained through contemporary culture
  and pragmatic criminal behaviour.
- A realistic portrayal of British policing shaped by understaffing, outsourcing, agency labour and bureaucratic
  constraint.
- A modern-slavery plot centred on the illegal medical exploitation of vulnerable migrants.
- Worcester, Hagley Woods, industrial estates and abandoned buildings create a distinctive landscape of
  Midlands liminal horror.
- The disgraced former policeman remains a restricted civilian consultant rather than receiving instant
  redemption.
faq:
- question: Where is Stone Cold Murder set?
  answer: In Worcester and the surrounding Worcestershire and West Mercia area, including Hagley Woods
    and Kidderminster.
- question: Is it part of a series?
  answer: Yes. It is Book 1 of the Dominion House series, originally known as the Mercia series.
- question: What is the central mystery?
  answer: The police must identify a woman found in a shallow grave with her hands missing and discover
    why she was killed.
- question: Who is the lead detective?
  answer: DC Ash Rigney, a recent transfer whose childhood in the Perspectivist Fellowship shaped her
    unusual view of reality.
- question: Is the book supernatural?
  answer: No. It discusses ritual, folklore and metaphysical belief, but apparently occult clues receive
    rational explanations.
- question: Is it fast-paced?
  answer: It emphasises the methodical grind of evidence, interviews and data analysis before building
    to a tense climax.
- question: Does it deal with social issues?
  answer: Yes. The novel addresses human trafficking, modern slavery, refugee vulnerability, outsourced
    services and institutional decay.
- question: Is it graphic?
  answer: It contains clinical descriptions of crime scenes, autopsies and physical injury.
- question: Who might enjoy it?
  answer: Readers of gritty British procedurals, forensic crime, philosophical mysteries and socially
    engaged regional noir.
