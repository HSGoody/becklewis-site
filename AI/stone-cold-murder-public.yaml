anti_tropes:
- The missing hands suggest ritual mutilation but were removed for practical forensic reasons.
- An apparently ancient tattoo is a World of Warcraft symbol.
- The disgraced former detective is not rapidly reinstated or fully redeemed.
- The civilian investigator is constrained by bureaucracy rather than indulged as a loose cannon.
- The occult framework is repeatedly replaced by mundane greed, prejudice and exploitation.
