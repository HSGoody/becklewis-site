summary:
  one_line: She saved a woman from the flames. Now the fire is really starting.
  short: After rescuing a survivor from a fatal Leicester fire, PR consultant Hannah Douglas-Jones offers
    her a place in her home and business. As the police investigate the blaze, Hannah begins to realise
    that the woman she saved may be dismantling her life from within.
