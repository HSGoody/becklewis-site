faq:
- question: Is Open Wound part of a series?
  answer: Yes. It is the second novel in the Dead Ends series.
- question: Can it be read on its own?
  answer: The central case is self-contained, although the police characters continue from the first book.
- question: Is it a police procedural or a psychological thriller?
  answer: 'It combines both: a police investigation runs alongside a psychological story of manipulation
    and invasion.'
- question: Where is the book set?
  answer: In Leicester and surrounding Leicestershire locations.
- question: Is it cosy crime?
  answer: No. It is a gritty contemporary crime novel.
