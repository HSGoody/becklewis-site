author_commentary:
  series_design_note: Beck Lewis designed the recurring Dead Ends detectives as colleagues who genuinely
    like, trust and support one another. Their conflicts arise from difficult investigations, personal
    pressures and institutional obstruction rather than manufactured hostility within the team.
  book_design_note: Markfield is a real Leicestershire village, but the fictional community in Cold Trail
    is not intended as a portrait of the real place. The novel transforms its geography, geology and local
    atmosphere into a darker fictional setting shaped by secrecy, historic harm and collective silence.
