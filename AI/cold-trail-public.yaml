logline: When librarian Bibi Cotton's boyfriend confesses to a killing connected to her sister's death,
  his sudden death forces her—and a sidelined police team—to uncover what their village has spent years
  hiding.
premise: A present-day confession reopens a fifteen-year-old family tragedy in Markfield. As Bibi Cotton
  questions what she knows about her sister's death, DS Rob Joseph, DC Josie Kaminski and DC Walker Smith
  are drawn from a low-status rural assignment into a case involving a missing man, local folklore, community
  hostility and institutional self-protection.
main_characters:
- name: Bibi Cotton
  role: protagonist
  description: A mixed-race librarian, survivor and compulsive fixer whose hyper-vigilance drives her
    to investigate.
- name: Callum Bentley
  role: inciting character
  description: Bibi's software-engineer boyfriend, whose troubling confession triggers the story.
- name: DS Rob Joseph
  role: recurring investigator
  description: A reflective, therapy-literate detective working within the sidelined Dead Ends team.
- name: DC Josie Kaminski
  role: recurring investigator
  description: An ambitious and outspoken detective frustrated by institutional exile and a toxic superior.
- name: DC Patrick 'Walker' Smith
  role: recurring investigator
  description: An experienced and outwardly stoic detective with a complicated professional past.
unique_selling_points:
- A dark police procedural built around a real Leicestershire landscape rarely used in commercial crime
  fiction.
- Local folklore is treated not as supernatural decoration but as a mechanism through which a community
  avoids an unbearable truth.
- The investigators are a capable but punished unit assigned deliberately unglamorous work.
- The civilian protagonist is a survivor whose vigilance, anger and need to fix things are strengths as
  well as wounds.
- The mystery connects present-day violence, historic family trauma and institutional self-preservation.
faq:
- question: Where is Cold Trail set?
  answer: Primarily in a fictionalised version of Markfield and the Charnwood Forest area of Leicestershire.
- question: Is Cold Trail part of a series?
  answer: Yes. It is the fourth Dead Ends novel and features the recurring police team of Rob Joseph,
    Josie Kaminski and Walker Smith.
- question: What kind of crime novel is it?
  answer: A gritty British police procedural and Midlands noir combining a present-day death with a historic
    mystery.
- question: Does it contain supernatural elements?
  answer: The story uses a local legend called the Charnwood Sprite, but it is not a supernatural novel.
- question: Is it a cosy mystery?
  answer: No. It deals with serious trauma, institutional failure, violence and morally difficult choices.
- question: Does the book have multiple viewpoints?
  answer: Yes. Bibi Cotton narrates in first person, while the police investigation is shown in third
    person.
- question: Is there humour?
  answer: There is dark, dry humour, particularly in the dialogue among the sidelined detectives.
- question: Who might enjoy it?
  answer: Readers of gritty, character-driven British crime such as Slow Horses, Broadchurch, Line of
    Duty and Ian Rankin.
