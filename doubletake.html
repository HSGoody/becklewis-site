  <style>
    * {

    body {

      font-size: 1rem;
      line-height: 1.4;

      background: #E85C0D;
      color: #ffffff;
      text-decoration: none;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.04em;

      border-radius: 8px;
      font-size: 1.1rem;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
